<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Pitt State Book Buyback{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header class="topbar">
        <div class="container topbar-inner">
            <div class="brand">
                <a class="brand-link" href="{{ url_for('home') }}">PittStateBookBuyback</a>
            </div>

            <nav class="nav">
                <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}"
                    href="{{ url_for('home') }}">Home</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container footer-inner">
            <span>© {{ 2026 }} Sickles-Orton Production</span>
        </div>
    </footer>

</body>

</html>
